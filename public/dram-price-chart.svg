  <text x="62" y="175" text-anchor="end" font-size="11" fill="#64748B">$4.0</text>
  <text x="62" y="226" text-anchor="end" font-size="11" fill="#64748B">$3.5</text>
  <text x="62" y="278" text-anchor="end" font-size="11" fill="#64748B">$3.0</text>
  <text x="62" y="329" text-anchor="end" font-size="11" fill="#64748B">$2.5</text>
