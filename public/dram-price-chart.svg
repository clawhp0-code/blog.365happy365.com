  <text x="870" y="334" text-anchor="end" font-size="11" font-weight="700" fill="#2563EB">$1.72/Gb</text>
  <line x1="720" y1="346" x2="872" y2="346" stroke="#E2E8F0" stroke-width="1"/>
  <!-- 1yr change -->
  <text x="734" y="362" font-size="10" fill="#374151">서버 1년 변동</text>
  <text x="870" y="362" text-anchor="end" font-size="11" font-weight="700" fill="#D97706">+2.6%</text>
  <text x="734" y="380" font-size="10" fill="#374151">PC DDR5 변동</text>
  <text x="870" y="380" text-anchor="end" font-size="11" font-weight="700" fill="#059669">±0%</text>
  <text x="734" y="398" font-size="10" fill="#374151">PC DDR4 변동</text>
  <text x="870" y="398" text-anchor="end" font-size="11" font-weight="700" fill="#EF4444">-4.4%</text>

  <!-- Source note -->
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#94A3B8">* 출처: DRAM Exchange, TrendForce 참고 / 계약가 기준 추정치 포함</text>
