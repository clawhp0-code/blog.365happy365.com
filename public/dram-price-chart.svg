  <line x1="70" y1="222" x2="680" y2="222" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="274" x2="680" y2="274" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
