  <text x="734" y="290" font-size="10" fill="#374151">서버 DDR5</text>
  <text x="870" y="290" text-anchor="end" font-size="11" font-weight="700" fill="#D97706">$3.90/Gb</text>
  <!-- DDR5 PC -->
