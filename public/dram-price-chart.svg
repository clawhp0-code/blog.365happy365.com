  <text x="796" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">범례</text>
  <!-- Server DDR5 -->
  <line x1="722" y1="155" x2="748" y2="155" stroke="#D97706" stroke-width="2.5"/>
  <circle cx="735" cy="155" r="3.5" fill="#D97706" stroke="white" stroke-width="1.5"/>
  <text x="754" y="159" font-size="10.5" fill="#374151">서버 DDR5</text>
