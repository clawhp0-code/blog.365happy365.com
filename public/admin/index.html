<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <style>
    #bulk-admin-link {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 9999;
      background: #ed8936;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-family: -apple-system, sans-serif;
    }
    #bulk-admin-link:hover { background: #dd6b20; }
    @keyframes pasteToastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
</head>
<body>
  <a id="bulk-admin-link" href="/admin/bulk.html" target="_blank">📋 일괄 관리</a>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        load_config_file: false,
        backend: {
          name: "github",
          repo: "clawhp0-code/blog.365happy365.com",
          branch: "main",
          base_url: "https://blog.365happy365.com",
          auth_endpoint: "/api/auth"
        },
        media_folder: "public/images/posts",
        public_folder: "/images/posts",
        collections: [
          {
            name: "posts",
            label: "Blog Posts",
            folder: "content/posts",
            create: true,
            slug: "{{fields.slug}}",
            extension: "mdx",
            format: "frontmatter",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Slug (영문)", name: "slug", widget: "string", hint: "영문 소문자, 숫자, 하이픈만 사용 (예: my-blog-post-2026)" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" },
              { label: "Category", name: "category", widget: "string" },
              { label: "Tags", name: "tags", widget: "list", default: [] },
              { label: "Featured", name: "featured", widget: "boolean", default: false },
              { label: "Draft", name: "draft", widget: "boolean", default: false },
              { label: "Cover Image", name: "coverImage", widget: "image", required: false },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
  <script>
  // ── 이미지 붙여넣기(Ctrl+V / Cmd+V) → GitHub 업로드 → 마크다운 삽입 ──
  (function () {
    function getGitHubToken() {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key) continue;
        if (key.includes('decap-cms') || key.includes('netlify-cms')) {
          try {
            const data = JSON.parse(localStorage.getItem(key));
            if (data && data.token) return data.token;
          } catch (_) {}
        }
      }
      return null;
    }

    function fileToBase64(file) {
      return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function () { resolve(reader.result.split(',')[1]); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showToast(message, type) {
      var existing = document.getElementById('paste-img-toast');
      if (existing) existing.remove();
      var colors = { info: '#3182ce', success: '#38a169', error: '#e53e3e' };
      var toast = document.createElement('div');
      toast.id = 'paste-img-toast';
      toast.textContent = message;
      toast.style.cssText = [
        'position:fixed', 'bottom:24px', 'right:24px', 'z-index:999999',
        'background:' + (colors[type] || colors.info), 'color:#fff',
        'padding:12px 18px', 'border-radius:8px', 'font-size:14px',
        'font-family:-apple-system,sans-serif', 'max-width:420px',
        'box-shadow:0 4px 16px rgba(0,0,0,.35)',
        'animation:pasteToastIn .25s ease'
      ].join(';');
      document.body.appendChild(toast);
      if (type !== 'info') setTimeout(function () { toast.remove(); }, 4000);
      return toast;
    }

    function insertText(target, text) {
      // CodeMirror 에디터
      var cmEl = target.closest ? target.closest('.CodeMirror') : null;
      if (cmEl && cmEl.CodeMirror) {
        cmEl.CodeMirror.replaceSelection(text);
        cmEl.CodeMirror.focus();
        return;
      }
      // textarea (Decap CMS raw 마크다운 모드)
      if (target.tagName === 'TEXTAREA') {
        var s = target.selectionStart, e = target.selectionEnd;
        target.value = target.value.substring(0, s) + text + target.value.substring(e);
        target.selectionStart = target.selectionEnd = s + text.length;
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }
      // contenteditable / Slate (WYSIWYG 모드)
      if (document.execCommand) {
        document.execCommand('insertText', false, text);
        return;
      }
      // 최후 수단: 클립보드에 복사
      navigator.clipboard.writeText(text).then(function () {
        showToast('📋 마크다운이 클립보드에 복사됐습니다. 직접 붙여넣기 해주세요.', 'info');
      });
    }

    function isEditorTarget(el) {
      if (!el) return false;
      if (el.tagName === 'TEXTAREA') return true;
      if (el.isContentEditable) return true;
      if (el.closest && (el.closest('.CodeMirror') || el.closest('[contenteditable="true"]'))) return true;
      return false;
    }

    document.addEventListener('paste', async function (e) {
      var items = Array.from((e.clipboardData || {}).items || []);
      var imgItem = items.find(function (it) { return it.type.startsWith('image/'); });
      if (!imgItem) return;
      if (!isEditorTarget(e.target)) return;

      e.preventDefault();

      var token = getGitHubToken();
      if (!token) {
        showToast('❌ 로그인이 필요합니다. 다시 로그인해주세요.', 'error');
        return;
      }

      var toast = showToast('⏳ 이미지 업로드 중…', 'info');
      var file = imgItem.getAsFile();
      var ext = (file.type.split('/')[1] || 'png').replace('jpeg', 'jpg');
      var filename = 'paste-' + Date.now() + '.' + ext;
      var apiPath = 'public/images/posts/' + filename;

      try {
        var base64 = await fileToBase64(file);
        var res = await fetch(
          'https://api.github.com/repos/clawhp0-code/blog.365happy365.com/contents/' + apiPath,
          {
            method: 'PUT',
            headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: 'chore: upload pasted image ' + filename,
              content: base64,
              branch: 'main'
            })
          }
        );
        if (!res.ok) {
          var errBody = await res.text();
          throw new Error(res.status + ' ' + errBody);
        }
        toast.remove();
        var markdown = '\n![이미지](/images/posts/' + filename + ')\n';
        insertText(e.target, markdown);
        showToast('✅ 이미지 업로드 완료: ' + filename, 'success');
      } catch (err) {
        toast.remove();
        showToast('❌ 업로드 실패: ' + err.message, 'error');
      }
    });
  })();
  </script>
</body>
</html>
