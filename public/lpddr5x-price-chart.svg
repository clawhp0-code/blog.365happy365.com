<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="600" fill="#F8FAFC" rx="12"/>
  <rect x="1" y="1" width="958" height="598" fill="none" stroke="#E2E8F0" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">노트북 LPDDR5X 가격 동향 (2025 Q1 ~ 2026 Q2)</text>
  <text x="380" y="56" text-anchor="middle" font-size="11" fill="#64748B">모듈 단가 기준 (DRAM Exchange·TrendForce 참고, 추정치 포함)</text>

  <!-- Plot area -->
  <rect x="80" y="74" width="620" height="400" fill="white" rx="4" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Horizontal grid lines - Y axis: $0 ~ $110 -->
  <!-- $110 = y74, $100 = y110.4, $90 = y146.7, $80 = y183.1, $70 = y219.5, $60 = y255.8, $50 = y292.2, $40 = y328.5, $30 = y364.9, $20 = y401.3, $10 = y437.6, $0 = y474 -->
  <line x1="80" y1="74"  x2="700" y2="74"  stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="110" x2="700" y2="110" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="147" x2="700" y2="147" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="183" x2="700" y2="183" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="219" x2="700" y2="219" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="256" x2="700" y2="256" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="292" x2="700" y2="292" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="328" x2="700" y2="328" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="365" x2="700" y2="365" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="401" x2="700" y2="401" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="437" x2="700" y2="437" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="474" x2="700" y2="474" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Y-axis labels ($) -->
  <text x="72" y="78"  text-anchor="end" font-size="10" fill="#64748B">$110</text>
  <text x="72" y="114" text-anchor="end" font-size="10" fill="#64748B">$100</text>
  <text x="72" y="151" text-anchor="end" font-size="10" fill="#64748B">$90</text>
  <text x="72" y="187" text-anchor="end" font-size="10" fill="#64748B">$80</text>
  <text x="72" y="223" text-anchor="end" font-size="10" fill="#64748B">$70</text>
  <text x="72" y="260" text-anchor="end" font-size="10" fill="#64748B">$60</text>
  <text x="72" y="296" text-anchor="end" font-size="10" fill="#64748B">$50</text>
  <text x="72" y="332" text-anchor="end" font-size="10" fill="#64748B">$40</text>
  <text x="72" y="369" text-anchor="end" font-size="10" fill="#64748B">$30</text>
  <text x="72" y="405" text-anchor="end" font-size="10" fill="#64748B">$20</text>
  <text x="72" y="441" text-anchor="end" font-size="10" fill="#64748B">$10</text>
  <text x="72" y="478" text-anchor="end" font-size="10" fill="#64748B">$0</text>

  <!-- Y-axis title -->
  <text x="18" y="274" text-anchor="middle" font-size="11" fill="#64748B" transform="rotate(-90, 18, 274)">모듈 단가 (USD)</text>

  <!-- Vertical grid lines for 6 quarters: Q1'25, Q2'25, Q3'25, Q4'25, Q1'26, Q2'26(E) -->
  <!-- x: 80 (start), 204, 328, 452, 576, 700 (end) — spacing 124px -->
  <line x1="204" y1="74" x2="204" y2="474" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="328" y1="74" x2="328" y2="474" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="452" y1="74" x2="452" y2="474" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="576" y1="74" x2="576" y2="474" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Shaded zone for forecast (Q2'26) -->
  <rect x="576" y="74" width="124" height="400" fill="#FEF3C7" fill-opacity="0.25"/>
  <text x="638" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E" font-style="italic">전망</text>

  <!-- ===== LPDDR5X 32GB area fill (coral/red) ===== -->
  <polygon points="80,328 204,310 328,292 452,256 576,147 700,110 700,474 80,474"
    fill="#EF4444" fill-opacity="0.07"/>

  <!-- ===== LPDDR5X 16GB area fill (purple) ===== -->
  <polygon points="80,401 204,389 328,374 452,347 576,292 700,265 700,474 80,474"
    fill="#8B5CF6" fill-opacity="0.07"/>

  <!-- ===== LPDDR5X 32GB line ===== -->
  <!-- Q1'25: $40, Q2'25: $45, Q3'25: $50, Q4'25: $60, Q1'26: $90, Q2'26(E): $100 -->
  <!-- y mapping: price -> 474 - (price/110)*400 -->
  <!-- $40=328.4, $45=310.2, $50=292, $60=255.6, $90=147.3, $100=110.2 -->
  <polyline points="80,328 204,310 328,292 452,256 576,147 700,110"
    fill="none" stroke="#EF4444" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 32GB dots -->
  <circle cx="80"  cy="328" r="5" fill="#EF4444" stroke="white" stroke-width="2"/>
  <circle cx="204" cy="310" r="5" fill="#EF4444" stroke="white" stroke-width="2"/>
  <circle cx="328" cy="292" r="5" fill="#EF4444" stroke="white" stroke-width="2"/>
  <circle cx="452" cy="256" r="5" fill="#EF4444" stroke="white" stroke-width="2"/>
  <circle cx="576" cy="147" r="6" fill="#EF4444" stroke="white" stroke-width="2"/>
  <circle cx="700" cy="110" r="6" fill="#EF4444" stroke="white" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- 32GB labels -->
  <text x="80"  y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">$40</text>
  <text x="204" y="302" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">$45</text>
  <text x="328" y="284" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">$50</text>
  <text x="452" y="248" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">$60</text>
  <text x="576" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">$90</text>
  <text x="700" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">~$100</text>

  <!-- ===== LPDDR5X 16GB line ===== -->
  <!-- Q1'25: $20, Q2'25: $23, Q3'25: $27, Q4'25: $35, Q1'26: $50, Q2'26(E): $57 -->
  <!-- $20=401.3, $23=390.4, $27=375.8, $35=346.7, $50=292, $57=266.5 -->
  <polyline points="80,401 204,390 328,376 452,347 576,292 700,267"
    fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 16GB dots -->
  <circle cx="80"  cy="401" r="5" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <circle cx="204" cy="390" r="5" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <circle cx="328" cy="376" r="5" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <circle cx="452" cy="347" r="5" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <circle cx="576" cy="292" r="6" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <circle cx="700" cy="267" r="6" fill="#8B5CF6" stroke="white" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- 16GB labels -->
  <text x="80"  y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">$20</text>
  <text x="204" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">$23</text>
  <text x="328" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">$27</text>
  <text x="452" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">$35</text>
  <text x="576" y="309" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">$50</text>
  <text x="700" y="284" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">~$57</text>

  <!-- X-axis labels -->
  <text x="80"  y="494" text-anchor="middle" font-size="11" fill="#475569">Q1'25</text>
  <text x="204" y="494" text-anchor="middle" font-size="11" fill="#475569">Q2'25</text>
  <text x="328" y="494" text-anchor="middle" font-size="11" fill="#475569">Q3'25</text>
  <text x="452" y="494" text-anchor="middle" font-size="11" fill="#475569">Q4'25</text>
  <text x="576" y="494" text-anchor="middle" font-size="11" fill="#475569">Q1'26</text>
  <text x="700" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Q2'26(E)</text>

  <!-- QoQ change rate bar area -->
  <text x="390" y="518" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">분기별 QoQ 변동률 (LPDDR5X 평균)</text>

  <!-- QoQ bars -->
  <!-- Q2'25: +15%, Q3'25: +18%, Q4'25: +45%, Q1'26: +90%, Q2'26: +58% -->
  <!-- bar area: y530 ~ y575 (45px height max for 90%) -->
  <rect x="187" y="567" width="34" height="8"  rx="2" fill="#22C55E" fill-opacity="0.7"/>
  <text x="204" y="564" text-anchor="middle" font-size="9" font-weight="600" fill="#15803D">+15%</text>

  <rect x="311" y="566" width="34" height="9"  rx="2" fill="#22C55E" fill-opacity="0.7"/>
  <text x="328" y="563" text-anchor="middle" font-size="9" font-weight="600" fill="#15803D">+18%</text>

  <rect x="435" y="553" width="34" height="22" rx="2" fill="#F97316" fill-opacity="0.7"/>
  <text x="452" y="550" text-anchor="middle" font-size="9" font-weight="600" fill="#C2410C">+45%</text>

  <rect x="559" y="530" width="34" height="45" rx="2" fill="#EF4444" fill-opacity="0.8"/>
  <text x="576" y="527" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">+90%</text>

  <rect x="683" y="543" width="34" height="32" rx="2" fill="#F97316" fill-opacity="0.6"/>
  <text x="700" y="540" text-anchor="middle" font-size="9" font-weight="600" fill="#C2410C">+58%</text>

  <!-- Annotation: Samsung-Apple 100% hike -->
  <line x1="452" y1="256" x2="514" y2="186" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="480" y="170" width="180" height="38" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="570" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">삼성 → 애플</text>
  <text x="570" y="200" text-anchor="middle" font-size="10" fill="#991B1B">LPDDR5X 100% 인상 합의</text>

  <!-- Annotation: Peak Q1'26 -->
  <rect x="530" y="109" width="140" height="20" rx="4" fill="#FEE2E2"/>
  <text x="600" y="123" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Q1'26 QoQ +88~93%</text>

  <!-- Legend box -->
  <rect x="730" y="120" width="210" height="190" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="835" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">범례</text>
  <line x1="740" y1="150" x2="930" y2="150" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 32GB legend -->
  <line x1="746" y1="172" x2="776" y2="172" stroke="#EF4444" stroke-width="3"/>
  <circle cx="761" cy="172" r="4" fill="#EF4444" stroke="white" stroke-width="1.5"/>
  <text x="784" y="176" font-size="11" fill="#374151" font-weight="600">LPDDR5X 32GB</text>

  <!-- 16GB legend -->
  <line x1="746" y1="198" x2="776" y2="198" stroke="#8B5CF6" stroke-width="3"/>
  <circle cx="761" cy="198" r="4" fill="#8B5CF6" stroke="white" stroke-width="1.5"/>
  <text x="784" y="202" font-size="11" fill="#374151" font-weight="600">LPDDR5X 16GB</text>

  <!-- Data summary -->
  <line x1="740" y1="218" x2="930" y2="218" stroke="#E2E8F0" stroke-width="1"/>
  <text x="835" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">1년 변동 (Q1'25→Q1'26)</text>

  <rect x="746" y="246" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="762" y="256" font-size="10" fill="#374151">32GB</text>
  <text x="928" y="256" text-anchor="end" font-size="11" font-weight="700" fill="#DC2626">+125%</text>

  <rect x="746" y="268" width="10" height="10" rx="2" fill="#8B5CF6"/>
  <text x="762" y="278" font-size="10" fill="#374151">16GB</text>
  <text x="928" y="278" text-anchor="end" font-size="11" font-weight="700" fill="#7C3AED">+150%</text>

  <line x1="740" y1="290" x2="930" y2="290" stroke="#E2E8F0" stroke-width="1"/>
  <text x="835" y="300" text-anchor="middle" font-size="9" fill="#94A3B8">BoM 내 메모리 비중</text>
  <text x="762" y="300" font-size="9" fill="#94A3B8">13%</text>
  <text x="835" y="300" text-anchor="middle" font-size="12" fill="#64748B">→</text>
  <text x="910" y="300" font-size="10" font-weight="700" fill="#DC2626">23%</text>

  <!-- Key insight box -->
  <rect x="730" y="330" width="210" height="130" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="835" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">핵심 포인트</text>
  <line x1="740" y1="358" x2="930" y2="358" stroke="#FED7AA" stroke-width="1"/>
  <text x="745" y="376" font-size="10" fill="#7C2D12">AI 서버용 HBM 전환으로</text>
  <text x="745" y="392" font-size="10" fill="#7C2D12">범용 DRAM 공급 급감</text>
  <text x="745" y="414" font-size="10" fill="#7C2D12">메모리+CPU 동반 인상 시</text>
  <text x="745" y="430" font-size="10" font-weight="700" fill="#DC2626">노트북 출고가 최대 40%↑</text>
  <text x="745" y="450" font-size="10" fill="#7C2D12">(TrendForce 전망)</text>

  <!-- Source -->
  <text x="390" y="592" text-anchor="middle" font-size="10" fill="#94A3B8">* 출처: DRAM Exchange, TrendForce, NotebookCheck, 업계 공개 자료 참고 / 추정치 포함</text>

</svg>
