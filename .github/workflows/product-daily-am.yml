name: Daily Product Post AM

on:
  schedule:
    - cron: "0 23 * * *"  # 매일 08:00 KST (UTC 23:00)
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate product AM post
        run: node scripts/product-daily.mjs am
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "product-bot"
          git config user.email "product-bot@blog.365happy365.com"
          git add content/posts/product-*.mdx
          git diff --staged --quiet || git commit -m "content: add daily product post (am)"
          git push origin main
