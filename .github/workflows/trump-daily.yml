name: Daily Trump News Post

on:
  schedule:
    - cron: "0 1 * * *"  # 매일 10:00 KST (UTC 01:00)
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate trump news post
        run: node scripts/trump-daily.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "trump-bot"
          git config user.email "trump-bot@blog.365happy365.com"
          git add content/posts/trump-*.mdx
          git diff --staged --quiet || git commit -m "content: add daily trump news post"
          git push origin main
